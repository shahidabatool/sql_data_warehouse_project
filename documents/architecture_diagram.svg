<svg viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1200" height="620" fill="#0f1117"/>

  <text x="600" y="45" text-anchor="middle" fill="#f5f5f5" font-size="28" font-weight="700">SQL Data Warehouse — Medallion Architecture</text>

  <!-- Sources -->
  <g>
    <rect x="40" y="110" width="200" height="110" rx="10" fill="#1c1f2b" stroke="#4a5568" stroke-width="1.5"/>
    <text x="140" y="140" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="600">CRM Source</text>
    <text x="140" y="165" text-anchor="middle" fill="#a0aec0" font-size="12">cust_info.csv</text>
    <text x="140" y="183" text-anchor="middle" fill="#a0aec0" font-size="12">prd_info.csv</text>
    <text x="140" y="201" text-anchor="middle" fill="#a0aec0" font-size="12">sales_details.csv</text>
  </g>

  <g>
    <rect x="40" y="250" width="200" height="110" rx="10" fill="#1c1f2b" stroke="#4a5568" stroke-width="1.5"/>
    <text x="140" y="280" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="600">ERP Source</text>
    <text x="140" y="305" text-anchor="middle" fill="#a0aec0" font-size="12">loc_a101.csv</text>
    <text x="140" y="323" text-anchor="middle" fill="#a0aec0" font-size="12">cust_az12.csv</text>
    <text x="140" y="341" text-anchor="middle" fill="#a0aec0" font-size="12">px_cat_g1v2.csv</text>
  </g>

  <!-- Arrows to Bronze -->
  <path d="M240 165 L 320 235" stroke="#718096" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M240 305 L 320 265" stroke="#718096" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Bronze -->
  <g>
    <rect x="330" y="180" width="230" height="180" rx="12" fill="#3a2a15" stroke="#cd7f32" stroke-width="2.5"/>
    <text x="445" y="215" text-anchor="middle" fill="#f6ad55" font-size="18" font-weight="700">🥉 Bronze Layer</text>
    <text x="445" y="245" text-anchor="middle" fill="#e2c9a8" font-size="12">Raw, unprocessed data</text>
    <text x="445" y="265" text-anchor="middle" fill="#e2c9a8" font-size="12">BULK INSERT from CSV</text>
    <text x="445" y="285" text-anchor="middle" fill="#e2c9a8" font-size="12">bronze.load_bronze</text>
    <text x="445" y="315" text-anchor="middle" fill="#a0866b" font-size="11">crm_cust_info · crm_prd_info</text>
    <text x="445" y="332" text-anchor="middle" fill="#a0866b" font-size="11">crm_sales_details · erp_loc_a101</text>
    <text x="445" y="349" text-anchor="middle" fill="#a0866b" font-size="11">erp_cust_az12 · erp_px_cat_g1v2</text>
  </g>

  <!-- Arrow Bronze -> Silver -->
  <path d="M560 270 L 640 270" stroke="#718096" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Silver -->
  <g>
    <rect x="650" y="180" width="230" height="180" rx="12" fill="#2a2f3a" stroke="#a0aec0" stroke-width="2.5"/>
    <text x="765" y="215" text-anchor="middle" fill="#cbd5e0" font-size="18" font-weight="700">🥈 Silver Layer</text>
    <text x="765" y="245" text-anchor="middle" fill="#dbe2ea" font-size="12">Cleaned &amp; standardized</text>
    <text x="765" y="265" text-anchor="middle" fill="#dbe2ea" font-size="12">Trim · dedup · type cast</text>
    <text x="765" y="285" text-anchor="middle" fill="#dbe2ea" font-size="12">silver.load_silver</text>
    <text x="765" y="315" text-anchor="middle" fill="#9aa5b1" font-size="11">Business rules applied</text>
    <text x="765" y="332" text-anchor="middle" fill="#9aa5b1" font-size="11">(marital status, gender,</text>
    <text x="765" y="349" text-anchor="middle" fill="#9aa5b1" font-size="11">category codes, etc.)</text>
  </g>

  <!-- Arrow Silver -> Gold -->
  <path d="M880 270 L 960 270" stroke="#718096" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Gold -->
  <g>
    <rect x="970" y="180" width="200" height="180" rx="12" fill="#3a3315" stroke="#ecc94b" stroke-width="2.5"/>
    <text x="1070" y="215" text-anchor="middle" fill="#f6e05e" font-size="18" font-weight="700">🥇 Gold Layer</text>
    <text x="1070" y="245" text-anchor="middle" fill="#eee0a8" font-size="12">Business-ready</text>
    <text x="1070" y="265" text-anchor="middle" fill="#eee0a8" font-size="12">star schema views</text>
    <text x="1070" y="300" text-anchor="middle" fill="#c9bb7a" font-size="11">dim_customer</text>
    <text x="1070" y="318" text-anchor="middle" fill="#c9bb7a" font-size="11">dim_products</text>
    <text x="1070" y="336" text-anchor="middle" fill="#c9bb7a" font-size="11">fact_sales</text>
  </g>

  <!-- Arrow down to reports -->
  <path d="M1070 360 L 1070 430" stroke="#718096" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <g>
    <rect x="945" y="440" width="250" height="90" rx="10" fill="#1c1f2b" stroke="#68d391" stroke-width="2"/>
    <text x="1070" y="472" text-anchor="middle" fill="#9ae6b4" font-size="15" font-weight="600">Reports · EDA</text>
    <text x="1070" y="495" text-anchor="middle" fill="#9ae6b4" font-size="15" font-weight="600">Advanced Analytics</text>
  </g>

  <!-- Bottom legend -->
  <text x="600" y="590" text-anchor="middle" fill="#718096" font-size="13">Raw ingestion → Cleansing &amp; standardization → Business-ready modeling</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#718096"/>
    </marker>
  </defs>
</svg>
